user nginx nginx;

events {
    worker_connections   2000;
}

http {
    include mime.types;

    keepalive_timeout 10;

    limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream technochat-server {
        server technochat:8080;
    }

    server {
        listen      80;

        include /etc/nginx/technochat_http.conf;
    }

    server {
        listen              443 ssl;

        limit_req zone=mylimit burst=20;
        limit_conn addr 10;

        client_body_timeout 5s;
        client_header_timeout 5s;
        client_max_body_size 5M;

        include /etc/nginx/technochat_tls.conf;

        proxy_set_header    Host      $http_host;
        proxy_set_header    X-Real-IP $remote_addr;

        location = / {
            return https://$host/html/messageadd.html;
        }

        location = /favicon.ico {
            root      /static/images;
            autoindex off;
            include /etc/nginx/technochat_static_cache.conf;
        }
        location = /manifest.webmanifest {
            root      /static;
            autoindex off;
            default_type application/manifest+json;
            include /etc/nginx/technochat_pwa_cache.conf;
        }
        location = /sw.js {
            root      /static;
            autoindex off;
            default_type application/javascript;
            add_header Service-Worker-Allowed "/";
            include /etc/nginx/technochat_pwa_cache.conf;
        }

        # Static files
        location ~ ^/(css|js|images|media)/ {
            root      /static;
            autoindex off;
            include /etc/nginx/technochat_static_cache.conf;
        }
        location ~ ^/robots.txt {
            root      /static;
            autoindex off;
            include /etc/nginx/technochat_static_cache.conf;
        }
        location ~ ^/html/ {
            root      /static;
            autoindex off;
            expires -1;
            add_header Cache-Control "no-store";
        }

        # API
        location ~ ^/api/v1/message/(add|view) {
            proxy_pass http://technochat-server;
        }
        location ~ ^/api/v1/image/(add|view) {
            proxy_pass http://technochat-server;
        }
        location ~ ^/api/v1/chat/init {
            proxy_pass http://technochat-server;
        }
        location ~ ^/api/v1/chat/(connect|reconnect) {
            proxy_pass http://technochat-server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / { return 403; }
    }
}
