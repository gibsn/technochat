services:
    redis:
        build:
            context: ../
            dockerfile: dist/redis.dockerfile
        image: gibsn/redis
        volumes:
            - redis_data:/data
        secrets:
            - redis.conf
        expose:
            - 6379

    technochat:
        build:
            context: ../
            dockerfile: dist/technochat.dockerfile
        image: gibsn/technochat
        depends_on:
            - redis
        expose:
            - 8080

    nginx:
        build:
            context: ../
            dockerfile: dist/nginx.dockerfile
        image: gibsn/nginx
        secrets:
            - source: nginx.conf
              target: /etc/nginx/nginx.conf
            - source: nginx.http.conf
              target: /etc/nginx/technochat_http.conf
            - source: nginx.tls.conf
              target: /etc/nginx/technochat_tls.conf
            - source: nginx.static-cache.conf
              target: /etc/nginx/technochat_static_cache.conf
            - source: nginx.pwa-cache.conf
              target: /etc/nginx/technochat_pwa_cache.conf
        depends_on:
            - technochat
        ports:
            - "${TECHNOCHAT_HTTP_PORT:-80}:80"
            - "${TECHNOCHAT_HTTPS_PORT:-443}:443"

volumes:
    redis_data:

secrets:
    redis.conf:
        file: redis.conf
