name: "Build, lint and run all tests"

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ '*' ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.18

    - name: Lint
      uses: golangci/golangci-lint-action@v8
      with:
        version: v2.11.4
        only-new-issues: true

  run-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - name: Set up Go
      uses: actions/setup-go@v2
      with:
        go-version: 1.18

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: ui-tests/package-lock.json

    - name: Install UI test dependencies
      run: npm --prefix ui-tests ci

    - name: Install Playwright system dependencies
      run: sudo npx --prefix ui-tests playwright install-deps chromium webkit

    - name: Install Playwright browsers
      run: npm --prefix ui-tests exec playwright install chromium webkit

    - name: Run smoke tests
      run: dist/run-isolated-tests.sh -- true

    - name: Run Go tests
      run: make go-tests

    - name: Run integration tests
      run: dist/run-isolated-tests.sh -- make integration-tests

    - name: Run UI unit tests
      run: dist/run-isolated-tests.sh -- make ui-unit-tests

    - name: Run UI end-to-end tests
      run: dist/run-isolated-tests.sh -- make ui-e2e-tests
