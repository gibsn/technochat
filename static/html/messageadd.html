<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Technochat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"/>
    <meta name="color-scheme" content="light">
    <meta name="theme-color" content="#dddddd">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="167x167" href="/images/apple-touch-icon-167x167.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/images/apple-touch-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="120x120" href="/images/apple-touch-icon-120x120.png">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/adaptive.css">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <script src="/js/lib/jquery-3.6.0.min.js"></script>
    <script src="/js/network-loader.js"></script>
    <script src="/js/lib/heic2any.min.js"></script>
    <script src="/js/pwa.js"></script>
    <script type="module" src="/js/message/add.js"></script>
</head>
<body>
<div class="content">
    <div class="logo">
        <h1>
            <a href="/">Technochat</a>
        </h1>
    </div>

    <form class="form" id="text_form" action="/api/v1/message/add"
          method="post" enctype="multipart/form-data" accept-charset="utf-8">

        <p>Leave a self-destructive message:</p>

        <div class="form__wrapper">
            <textarea id="text" class="area__message js__textarea" name="text" autofocus="true"
                      placeholder="Right here"></textarea>
            <div class="text__symbols">
                <span class="js__counter"></span>/<span class="js__counter-max"></span>
            </div>
            <div class="upload">
                <input hidden type="file" id="file-input" multiple accept="image/*">
                <label class="button upload__label" for="file-input">Upload Images</label>
                <div id="upload_status"></div>
                <div class="upload__preview" id="preview"></div>
            </div>
        </div>

        <div class="ttl">
            <div class="expires">Expires in:</div>
            <label class="container">1 day
                <input type="radio" checked name="ttl" value=86400>
                <span class="checkmark"></span>
            </label>
            <label class="container">2 days
                <input type="radio" name="ttl" value=172800>
                <span class="checkmark"></span>
            </label>
            <label class="container">1 week
                <input type="radio" name="ttl" value=604800>
                <span class="checkmark"></span>
            </label>
        </div>

        <button class="button" id="generate_button">
            Generate
        </button>

    </form>
    <div class="message__box" id="message_box" style="display: none;">
        <div id="loading" class="message__loading" aria-live="polite">
            <div id="loading_label" class="message__loading-label">Generating link...</div>
            <div class="message__loading-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-labelledby="loading_label">
                <div id="loading_bar" class="message__loading-bar"></div>
            </div>
        </div>
        <div class="message">
            <p>Your message: </p>
            <p id="result_text" class="result__message"></p>
        </div>
        <div class="link">
            <p>Link: </p>
            <div id="result_link" class="result__link"></div>
        </div>
        <button class="button" id="copy_button">
            Copy link
        </button>
    </div>
    <p>or</p>
    <a href="/html/initchat.html" class="button" id="create_chat">Use a chat</a>
</div>
</body>
</html>
