<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
    <title>TechnoChat</title>
    <meta name="theme-color" content="#dddddd">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="167x167" href="/images/apple-touch-icon-167x167.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/images/apple-touch-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="120x120" href="/images/apple-touch-icon-120x120.png">

    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="/css/lib/emojione.min.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/chat.css">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
</head>

<body>
    <div class="wrapper">
        <div class="header">
            <div class="logo">
                <h1><a href="/">Technochat</a></h1>
            </div>
        </div>
        <div class="main" id="app">
            <div v-if="okconnected" class="chat_shell">
                <div class="presence_bar">
                    <button
                        class="presence_button"
                        type="button"
                        @click="openPresence"
                        aria-haspopup="dialog"
                        :aria-expanded="presenceOpen ? 'true' : 'false'"
                    >
                        {{ presenceLabel }}
                    </button>
                </div>
                <div class="chat_content">
                    <div id="chat-messages" class="chat_messages" v-html="chatContent"></div>
                </div>
                <div v-if="typingText" class="typing_indicator" aria-live="polite">
                    <span>{{ typingText }}</span>
                    <span class="typing_dots" aria-hidden="true">
                        <i></i>
                        <i></i>
                        <i></i>
                    </span>
                </div>
                <div class="message_input">
                    <div class="message_input_inner group">
                        <input
                            type="text"
                            v-model="newMsg"
                            @input="notifyTyping"
                            @keyup.enter="send"
                            placeholder="Write a message"
                        >
                        <span class="bar"></span>
                        <button class="chat_button" @click="send" aria-label="Send message">
                            <i class="material-icons">send</i>
                        </button>
                    </div>
                </div>
                <div
                    v-if="presenceOpen"
                    class="presence_modal"
                    role="dialog"
                    aria-modal="true"
                    aria-labelledby="presence_title"
                    @click.self="closePresence"
                >
                    <div class="presence_panel">
                        <div class="presence_header">
                            <h2 id="presence_title">Online users</h2>
                            <button class="presence_close" type="button" @click="closePresence" aria-label="Close">
                                <i class="material-icons">close</i>
                            </button>
                        </div>
                        <div class="presence_list">
                            <div v-for="user in presence.users" :key="user.id" class="presence_user">
                                <img
                                    :src="roboHash(user.name)"
                                    :alt="user.name"
                                    loading="lazy"
                                    @error="useFallbackAvatar($event, user.name)"
                                >
                                <span>{{ user.name }}</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div v-if="!okconnected" class="chat_error">
                Poshel nah
            </div>
        </div>
    </div>
    <script src="/js/lib/vue.min.js"></script>
    <script src="/js/lib/emojione.min.js"></script>
    <script src="/js/lib/jquery-3.6.0.min.js"></script>
    <script src="/js/lib/md5.js"></script>
    <script src="/js/lib/materialize.min.js"></script>
    <script src="/js/lib/PageTitleNotification.js"></script>
    <script src="/js/pwa.js"></script>
    <script type="module" src="/js/chat/chat.js"></script>
</body>
</html>
