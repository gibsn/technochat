<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Technochat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"/>
    <meta name="color-scheme" content="light">
    <meta name="theme-color" content="#dddddd">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="167x167" href="/images/apple-touch-icon-167x167.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/images/apple-touch-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="120x120" href="/images/apple-touch-icon-120x120.png">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/adaptive.css">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <script src="/js/lib/jquery-3.6.0.min.js"></script>
    <script src="/js/network-loader.js"></script>
    <script src="/js/pwa.js"></script>
    <script type="module" src="/js/chat/init.js"></script>
</head>
<body>
<div class="content">
    <div class="logo">
        <h1>
            <a href="/">Technochat</a>
        </h1>
    </div>

    <form class="user__form" id="text_form" action="/api/v1/chat/init" method="post" enctype="application/json">
        <p>Set how many times your chat can be joined:</p>
        <input class="user__input" type="number" name="max_users" step="1" value=2 min=2>

        <button class="button">
            Create chat
        </button>
    </form>

    <p id="join_link_divider">or</p>

    <form class="chat_join_form" id="join_link_form">
        <input
            class="chat_join_input"
            id="join_link"
            type="text"
            placeholder="Paste chat link"
            autocomplete="off"
            inputmode="url"
        >
        <button class="button" type="submit">Join by link</button>
        <div class="chat_join_error" id="join_link_error"></div>
    </form>

    <div id="loading">loading</div>
    <div id="link_box" class="link">
        <p>Link: </p>
        <div id="result_link" class="result__link result__link--chat"></div>
    </div>

    <div class="chat-actions">
        <button class="button" id="copy_button">
            Copy link
        </button>
        <a href="#" class="button" id="join_button">Join</a>
    </div>
</div>
</body>
</html>
